<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>VYONDA Health & Wellness</title>

<style>
body {
    margin: 0;
    font-family: Arial, Helvetica, sans-serif;
    background: radial-gradient(circle at center, #0b1d3a, #020814);
    color: white;
}

header {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

.hero {
    text-align: center;
}

/* LOGO SUPERIOR */
.logo-img {
    width: 120px;
    margin-bottom: 20px;
}

/* LETRAS GRANDES */
.letras-img {
    width: 80%;
    max-width: 800px;
    display: block;
    margin: 0 auto;
}

/* LINEA DORADA */
.gold-line {
    width: 200px;
    height: 2px;
    margin: 20px auto;
    background: linear-gradient(to right, transparent, gold, transparent);
}

/* TEXTO */
h1 {
    font-weight: 300;
    letter-spacing: 2px;
}

p {
    max-width: 600px;
    margin: auto;
    opacity: 0.8;
}

/* BOTON */
.btn {
    display: inline-block;
    margin-top: 20px;
    padding: 12px 25px;
    border-radius: 25px;
    background: gold;
    color: black;
    text-decoration: none;
    font-weight: bold;
}
</style>
</head>

<body>

<header>
    <div class="hero">

        <img src="logo-vyonda.png" class="logo-img">

        <img src="letras-vyonda.png" class="letras-img">

        <div class="gold-line"></div>

        <h1>Ciencia · Salud · Bienestar</h1>

        <p>Productos funcionales diseñados para transformar tu vida desde el interior.</p>

        <a href="#" class="btn">Ver productos</a>

    </div>
</header>

</body>
</html>
